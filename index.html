<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTER ONLINE SERVICE</title>
    <link rel="icon" type="image/png" href="/_png.png" />
    <link rel="apple-touch-icon" href="/_png.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2754F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ASTER" />
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Attempted to overwrite window.fetch, ignored.'); },
            configurable: true,
            enumerable: true
          });
          const proto = Object.getPrototypeOf(window);
          if (proto && proto.hasOwnProperty('fetch')) {
            const desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
            if (desc && desc.configurable) {
              Object.defineProperty(proto, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Blocked fetch overwrite on prototype'); },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
