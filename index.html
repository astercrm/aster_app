<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASTER ONLINE SERVICE</title>
    <link rel="icon" type="image/png" href="/_png.png" />
    <link rel="apple-touch-icon" href="/_png.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2754F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ASTER" />
    <script>
      (function() {
        try {
          const originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function(v) { console.warn('Attempted to overwrite window.fetch, ignored.'); },
            configurable: true,
            enumerable: true
          });
          const proto = Object.getPrototypeOf(window);
          if (proto && proto.hasOwnProperty('fetch')) {
            const desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
            if (desc && desc.configurable) {
              Object.defineProperty(proto, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Blocked fetch overwrite on prototype'); },
                configurable: true,
                enumerable: true
              });
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Loading state visible until React mounts -->
      <div id="app-loading" style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui;background:linear-gradient(135deg,#eef2ff,#e0e7ff,#ede9fe)">
        <div style="text-align:center">
          <div style="width:48px;height:48px;border:4px solid #e0e7ff;border-top:4px solid #2754F5;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px"></div>
          <p style="color:#6b7280;font-size:14px">Loading ASTER...</p>
        </div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script>
      // Global error handler — shows error if React fails to mount
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        var loading = document.getElementById('app-loading');
        if (loading) {
          loading.innerHTML = '<div style="padding:40px;max-width:600px;margin:0 auto;text-align:left">' +
            '<h1 style="color:#dc2626;font-size:20px;margin-bottom:12px">App failed to load</h1>' +
            '<pre style="background:#fef2f2;padding:12px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap;color:#991b1b">' +
            e.message + '\n\n' + (e.filename || '') + ':' + (e.lineno || '') +
            '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#2754F5;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold">Reload</button></div>';
        }
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
